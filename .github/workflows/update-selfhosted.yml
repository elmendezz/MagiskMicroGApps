name: Actualizar MagiskMicroGApps (Windows CMD)

on:
  workflow_dispatch:
  schedule:
    # Se ejecuta cada 12 horas
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: self-hosted
    defaults:
      run:
        shell: cmd

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Descargar APKs y Validar (Powershell nativo)
        shell: powershell
        run: |
          if (-not (Test-Path "new_apks")) { New-Item -ItemType Directory -Path "new_apks" | Out-Null }

          function Download-WithProgress {
              param([string]$name, [string]$outPath, [string]$url)
              if (-not $url -or $url -eq "null") {
                  Write-Host "⚠️ Advertencia: URL inválida para $name. Se omitirá."
                  return
              }
              Write-Host "🌐 Descargando $name desde: $url"
              
              try {
                  $request = [System.Net.WebRequest]::Create($url)
                  $request.UserAgent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
                  $response = $request.GetResponse()
                  $totalLength = $response.ContentLength
                  
                  $stream = $response.GetResponseStream()
                  $fileStream = [System.IO.FileStream]::new($outPath, [System.IO.FileMode]::Create)
                  $buffer = New-Object byte[] 8192
                  $downloaded = 0
                  $lastPercent = -1

                  do {
                      $read = $stream.Read($buffer, 0, $buffer.Length)
                      if ($read -gt 0) {
                          $downloaded += $read
                          $fileStream.Write($buffer, 0, $read)
                          if ($totalLength -gt 0) {
                              $percent = [math]::Floor(($downloaded / $totalLength) * 100)
                              if (($percent % 10 -eq 0) -and ($percent -ne $lastPercent)) {
                                  Write-Host "⏳ $name Progreso: $percent%"
                                  $lastPercent = $percent
                              }
                          }
                      }
                  } while ($read -gt 0)
                  
                  $fileStream.Dispose()
                  $stream.Dispose()
                  $response.Dispose()
                  
                  if ((Get-Item $outPath).Length -lt 1024) {
                      Write-Host "⚠️ Advertencia: Descarga fallida o archivo de 0 bytes para $name. Se omitirá."
                      Remove-Item $outPath -Force
                  } else {
                      Write-Host "✅ $name descargado correctamente.`n"
                  }
              } catch {
                  Write-Host "⚠️ Error al descargar $name: $_"
                  if (Test-Path $outPath) { Remove-Item $outPath -Force }
              }
          }

          # 1. MicroG (GmsCore)
          $microgUrl = (Invoke-RestMethod 'https://api.github.com/repos/microg/GmsCore/releases/latest').assets | Where-Object { $_.name -like 'com.google.android.gms*' -and $_.name -notlike '*-hw*' } | Select-Object -ExpandProperty browser_download_url -First 1
          Download-WithProgress -name "MicroG" -outPath "new_apks\GmsCore.apk" -url $microgUrl

          # 2. MicroG Companion
          $companionUrl = (Invoke-RestMethod 'https://api.github.com/repos/microg/GmsCore/releases/latest').assets | Where-Object { $_.name -like 'com.android.vending*' -and $_.name -notlike '*-hw*' } | Select-Object -ExpandProperty browser_download_url -First 1
          Download-WithProgress -name "MicroG Companion" -outPath "new_apks\Companion.apk" -url $companionUrl

          # 3. Aurora Store
          $auroraApi = Invoke-RestMethod 'https://gitlab.com/api/v4/projects/6922885/releases'
          $latestAurora = $auroraApi[0]
          $auroraUrl = $null
          if ($latestAurora.description -match '(/uploads/[a-zA-Z0-9]+/[^\s)]+\.apk)') { 
              $auroraUrl = 'https://gitlab.com/-/project/6922885' + $matches[1] 
          } elseif ($latestAurora.assets.links) { 
              $auroraUrl = ($latestAurora.assets.links | Where-Object { $_.url -match '\.apk$' } | Select-Object -ExpandProperty url -First 1)
          }
          Download-WithProgress -name "Aurora Store" -outPath "new_apks\AuroraStore.apk" -url $auroraUrl

          # 4. Aurora Services
          $svcApi = Invoke-RestMethod 'https://gitlab.com/api/v4/projects/8363046/releases'
          $latestSvc = $svcApi[0]
          $svcUrl = $null
          if ($latestSvc.assets.links) {
              $svcUrl = ($latestSvc.assets.links | Where-Object { $_.url -match '\.apk$' } | Select-Object -ExpandProperty url -First 1)
          }
          if (-not $svcUrl -and $latestSvc.description -match '(/uploads/[a-zA-Z0-9]+/[^\s)]+\.apk)') {
              $svcUrl = 'https://gitlab.com/-/project/8363046' + $matches[1]
          }
          if (-not $svcUrl) {
              Write-Host "⏸️ Usando versión base segura para Aurora Services..."
              $svcUrl = "https://gitlab.com/-/project/8363046/uploads/c22e95975571e9db143567690777a56e/AuroraServices_v1.1.1.apk"
          }
          Download-WithProgress -name "Aurora Services" -outPath "new_apks\AuroraServices.apk" -url $svcUrl

          # 5. FakeGApps
          $fakeGappsUrl = (Invoke-RestMethod 'https://api.github.com/repos/whew-inc/FakeGApps/releases/latest').assets | Where-Object { $_.name -like '*.apk' } | Select-Object -ExpandProperty browser_download_url -First 1
          if (-not $fakeGappsUrl) { $fakeGappsUrl = "https://github.com/whew-inc/FakeGApps/releases/download/6.6/app-release.apk" }
          Download-WithProgress -name "FakeGApps" -outPath "new_apks\FakeGApps.apk" -url $fakeGappsUrl

          # 6. GsfProxy
          $gsfProxyUrl = (Invoke-RestMethod 'https://api.github.com/repos/microg/GsfProxy/releases/latest').assets | Where-Object { $_.name -like '*.apk' } | Select-Object -ExpandProperty browser_download_url -First 1
          if (-not $gsfProxyUrl) { $gsfProxyUrl = "https://github.com/microg/GsfProxy/releases/download/v0.1.0/GsfProxy.apk" }
          Download-WithProgress -name "GsfProxy" -outPath "new_apks\GsfProxy.apk" -url $gsfProxyUrl

          # 7. Google Sync Apps (Extrayendo del último zip)
          Write-Host "🔍 Buscando MicroGiskGApps-32.zip en el último release..."
          $repo = "${{ github.repository }}"
          try {
              $latestRelease = Invoke-RestMethod "https://api.github.com/repos/$repo/releases/latest"
              $zipUrl = ($latestRelease.assets | Where-Object { $_.name -eq "MicroGiskGApps-32.zip" }).browser_download_url
              
              if ($zipUrl) {
                  Write-Host "📦 Descargando zip base..."
                  Invoke-WebRequest -Uri $zipUrl -OutFile "latest_base.zip"
                  
                  Write-Host "📂 Extrayendo Sync Apps..."
                  Expand-Archive -Path "latest_base.zip" -DestinationPath "extracted_base" -Force
                  
                  if (Test-Path "extracted_base\system\app\GoogleContactsSync\GoogleContactsSync.apk") {
                      Copy-Item "extracted_base\system\app\GoogleContactsSync\GoogleContactsSync.apk" -Destination "new_apks\GoogleContactsSync.apk" -Force
                      Write-Host "✅ Google Contacts Sync extraído."
                  }
                  if (Test-Path "extracted_base\system\app\GoogleCalendarSync\GoogleCalendarSync.apk") {
                      Copy-Item "extracted_base\system\app\GoogleCalendarSync\GoogleCalendarSync.apk" -Destination "new_apks\GoogleCalendarSync.apk" -Force
                      Write-Host "✅ Google Calendar Sync extraído."
                  }
                  
                  Remove-Item "latest_base.zip" -Force
                  Remove-Item "extracted_base" -Recurse -Force
              } else {
                  Write-Host "⚠️ No se encontró el zip base en el último release."
              }
          } catch {
              Write-Host "⚠️ Error al buscar/extraer el release anterior."
          }

      - name: 🚀 Optimizar APKs (Zipalign)
        run: |
          :: Asumiendo que zipalign está en una ruta conocida o en el PATH
          :: Si no está en el PATH de tu runner, cambia "zipalign.exe" por la ruta completa (ej. "C:\AndroidSDK\build-tools\34.0.0\zipalign.exe")
          for %%f in (new_apks\*.apk) do (
              zipalign.exe -p -v 4 "%%f" "%%~dpnf-aligned.apk"
              if exist "%%~dpnf-aligned.apk" (
                  move /y "%%~dpnf-aligned.apk" "%%f"
              )
          )

      - name: 🔍 Obtener versiones y generar Changelog Base
        id: vars
        shell: powershell
        run: |
          # En Windows no solemos tener aapt por defecto en el PATH como en Ubuntu.
          # Para simplificar y evitar dependencias complejas, leeremos las versiones del module.prop anterior o dejaremos marcadores genéricos.
          # Si tienes aapt en tu self-hosted runner, puedes implementarlo similar a zipalign.
          
          $modulePath = "module.prop"
          if (-not (Test-Path $modulePath)) { New-Item $modulePath -ItemType File | Out-Null }
          
          $content = Get-Content $modulePath
          $oldVc = 1
          $oldVer = "13.0"
          
          foreach ($line in $content) {
              if ($line -match "^versionCode=(\d+)") { $oldVc = [int]$matches[1] }
              if ($line -match "^version=A(\d+\.\d+)") { $oldVer = $matches[1] }
          }
          
          $newVc = $oldVc + 1
          
          # Lógica para incrementar version mayor.menor
          $parts = $oldVer.Split('.')
          $major = [int]$parts[0]
          $minor = 0
          if ($parts.Length -gt 1) { $minor = [int]$parts[1] }
          $minor++
          if ($minor -ge 10) { $major++; $minor = 0 }
          
          $newVer = "A" + $major + "." + $minor + "-MicroG"
          
          # Actualizar module.prop
          $newContent = @()
          $hasId = $false; $hasName = $false; $hasVersion = $false; $hasVc = $false
          
          foreach ($line in $content) {
              if ($line -match "^id=") { $newContent += "id=MicroGiskGApps"; $hasId = $true }
              elseif ($line -match "^name=") { $newContent += "name=MicroGiskGApps"; $hasName = $true }
              elseif ($line -match "^version=") { $newContent += "version=$newVer"; $hasVersion = $true }
              elseif ($line -match "^versionCode=") { $newContent += "versionCode=$newVc"; $hasVc = $true }
              else { $newContent += $line }
          }
          
          if (-not $hasId) { $newContent += "id=MicroGiskGApps" }
          if (-not $hasName) { $newContent += "name=MicroGiskGApps" }
          if (-not $hasVersion) { $newContent += "version=$newVer" }
          if (-not $hasVc) { $newContent += "versionCode=$newVc" }
          
          $newContent | Set-Content $modulePath
          
          echo "NEW_VC=$newVc" >> $env:GITHUB_ENV
          echo "FINAL_TAG=$newVer" >> $env:GITHUB_ENV
          
          # Generar Changelog
          $changelog = @"
          ### Changelog / Registro de cambios
          #### Núcleo (Core)
          - **MicroG (GmsCore)**: Actualizado
          - **MicroG Companion**: Actualizado
          - **GsfProxy**: Actualizado
          - **FakeGApps**: Actualizado
          
          #### Tienda y Servicios (Store & Services)
          - **Aurora Store**: Actualizado
          - **Aurora Services**: Actualizado
          - **Google Contacts Sync**: Mantenido
          - **Google Calendar Sync**: Mantenido
          
          "@
          $changelog | Set-Content "changelog.md"

      - name: 🔐 Generar Archivos de Permisos Totales (XML)
        shell: powershell
        run: |
          if (-not (Test-Path "new_permissions")) { New-Item -ItemType Directory -Path "new_permissions" | Out-Null }
          
          $privAppXml = @"
          <?xml version="1.0" encoding="utf-8"?>
          <permissions>
              <privapp-permissions package="com.google.android.gms">
                  <permission name="android.permission.INTERACT_ACROSS_USERS"/>
                  <permission name="android.permission.UPDATE_APP_OPS_STATS"/>
                  <permission name="android.permission.INSTALL_PACKAGES"/>
                  <permission name="android.permission.DELETE_PACKAGES"/>
                  <permission name="android.permission.SUBSTITUTE_SHARE_TARGET_APP"/>
                  <permission name="android.permission.ALLOCATE_AGGRESSIVE"/>
                  <permission name="android.permission.REBOOT"/>
                  <permission name="android.permission.MODIFY_PHONE_STATE"/>
              </privapp-permissions>
              <privapp-permissions package="com.android.vending">
                  <permission name="android.permission.INSTALL_PACKAGES"/>
                  <permission name="android.permission.DELETE_PACKAGES"/>
                  <permission name="android.permission.BATTERY_STATS"/>
                  <permission name="android.permission.UPDATE_DEVICE_STATS"/>
                  <permission name="android.permission.INTERACT_ACROSS_USERS"/>
                  <permission name="android.permission.PACKAGE_USAGE_STATS"/>
                  <permission name="android.permission.GET_APP_OPS_STATS"/>
              </privapp-permissions>
              <privapp-permissions package="com.aurora.store">
                  <permission name="android.permission.INSTALL_PACKAGES"/>
                  <permission name="android.permission.DELETE_PACKAGES"/>
                  <permission name="android.permission.INTERACT_ACROSS_USERS"/>
                  <permission name="android.permission.BATTERY_STATS"/>
              </privapp-permissions>
              <privapp-permissions package="com.aurora.services">
                  <permission name="android.permission.INSTALL_PACKAGES"/>
                  <permission name="android.permission.DELETE_PACKAGES"/>
                  <permission name="android.permission.INTERACT_ACROSS_USERS"/>
              </privapp-permissions>
          </permissions>
          "@
          $privAppXml | Set-Content "new_permissions\privapp-permissions-microg.xml" -Encoding UTF8
          
          $sysConfigXml = @"
          <?xml version="1.0" encoding="utf-8"?>
          <config>
              <allow-in-power-save package="com.google.android.gms"/>
              <allow-in-power-save package="com.android.vending"/>
              <allow-in-power-save package="com.aurora.store"/>
              <allow-in-power-save package="com.aurora.services"/>
              <allow-in-data-usage-save package="com.google.android.gms"/>
              <allow-unthrottled-location package="com.google.android.gms"/>
              <allow-ignore-location-settings package="com.google.android.gms"/>
          </config>
          "@
          $sysConfigXml | Set-Content "new_permissions\sysconfig-microg.xml" -Encoding UTF8

      - name: 🛠️ Construir Zips (32-bit y 64-bit)
        shell: powershell
        run: |
          if (Test-Path "mmt_template") { Remove-Item "mmt_template" -Recurse -Force }
          git clone --depth 1 https://github.com/Zackptg5/MMT-Extended.git mmt_template
          
          $arches = @("32", "64")
          
          foreach ($arch in $arches) {
              $buildDir = "build-$arch"
              if (Test-Path $buildDir) { Remove-Item $buildDir -Recurse -Force }
              
              # Copiar template básico (reemplazo de rsync)
              Copy-Item -Path "mmt_template" -Destination $buildDir -Recurse
              
              # Limpieza de template
              $itemsToRemove = @(".git", ".github", "README.md", ".gitignore", "changelog.md", "LICENSE", "update.json", "install.zip", "zygisk")
              foreach ($item in $itemsToRemove) {
                  $pathToRemove = Join-Path $buildDir $item
                  if (Test-Path $pathToRemove) { Remove-Item $pathToRemove -Recurse -Force }
              }
              Get-ChildItem -Path $buildDir -Recurse -Filter "*placeholder*" | Remove-Item -Force
              
              # Crear estructura de directorios
              $dirs = @(
                  "system\priv-app\GmsCore",
                  "system\priv-app\Companion",
                  "system\priv-app\FakeGApps",
                  "system\priv-app\AuroraServices",
                  "system\priv-app\AuroraStore",
                  "system\app\GsfProxy",
                  "system\app\GoogleContactsSync",
                  "system\app\GoogleCalendarSync",
                  "system\etc\permissions",
                  "system\etc\sysconfig"
              )
              foreach ($dir in $dirs) {
                  $fullPath = Join-Path $buildDir $dir
                  New-Item -ItemType Directory -Path $fullPath -Force | Out-Null
              }
              
              # Copiar archivos base
              Copy-Item "module.prop" -Destination $buildDir -Force
              if (Test-Path "uninstall.sh") { Copy-Item "uninstall.sh" -Destination $buildDir -Force }
              if (Test-Path "common") { Copy-Item "common\*" -Destination "$buildDir\common\" -Recurse -Force }
              if (Test-Path "system") { Copy-Item "system\*" -Destination "$buildDir\system\" -Recurse -Force }
              
              # Copiar APKs
              $apkMap = @{
                  "GmsCore.apk" = "system\priv-app\GmsCore"
                  "Companion.apk" = "system\priv-app\Companion"
                  "FakeGApps.apk" = "system\priv-app\FakeGApps"
                  "AuroraStore.apk" = "system\priv-app\AuroraStore"
                  "AuroraServices.apk" = "system\priv-app\AuroraServices"
                  "GsfProxy.apk" = "system\app\GsfProxy"
                  "GoogleContactsSync.apk" = "system\app\GoogleContactsSync"
                  "GoogleCalendarSync.apk" = "system\app\GoogleCalendarSync"
              }
              
              foreach ($key in $apkMap.Keys) {
                  $src = Join-Path "new_apks" $key
                  if (Test-Path $src) {
                      $destDir = Join-Path $buildDir $apkMap[$key]
                      Copy-Item $src -Destination "$destDir\$key" -Force
                  }
              }
              
              # Copiar Permisos
              Copy-Item "new_permissions\privapp-permissions-microg.xml" -Destination "$buildDir\system\etc\permissions\" -Force
              Copy-Item "new_permissions\sysconfig-microg.xml" -Destination "$buildDir\system\etc\sysconfig\" -Force
              
              # Configurar updateJson
              $jsonFile = if ($arch -eq "32") { "update32.json" } else { "update.json" }
              $repo = "${{ github.repository }}"
              $modPropPath = "$buildDir\module.prop"
              $propContent = Get-Content $modPropPath
              $newPropContent = @()
              $hasUpdateJson = $false
              foreach ($line in $propContent) {
                  if ($line -match "^updateJson=") {
                      $newPropContent += "updateJson=https://raw.githubusercontent.com/$repo/main/$jsonFile"
                      $hasUpdateJson = $true
                  } else {
                      $newPropContent += $line
                  }
              }
              if (-not $hasUpdateJson) {
                  $newPropContent += "updateJson=https://raw.githubusercontent.com/$repo/main/$jsonFile"
              }
              $newPropContent | Set-Content $modPropPath
              
              # Comprimir
              $zipName = "MicroGiskGApps-$arch.zip"
              if (Test-Path $zipName) { Remove-Item $zipName -Force }
              Compress-Archive -Path "$buildDir\*" -DestinationPath $zipName -Force
          }

      - name: 🔒 Generar Hashes de Seguridad y anexar al Changelog
        shell: powershell
        run: |
          $hash64 = (Get-FileHash -Path "MicroGiskGApps-64.zip" -Algorithm SHA256).Hash.ToLower()
          $hash32 = (Get-FileHash -Path "MicroGiskGApps-32.zip" -Algorithm SHA256).Hash.ToLower()
          
          Add-Content -Path "changelog.md" -Value "`n### 🔒 Checksums (SHA256)"
          Add-Content -Path "changelog.md" -Value "- **64-bit:** \`$hash64\`"
          Add-Content -Path "changelog.md" -Value "- **32-bit:** \`$hash32\`"

      - name: 📝 Generar update.jsons y Commitear cambios al Repo
        shell: powershell
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ env.FINAL_TAG }}"
          $vc = ${{ env.NEW_VC }}
          
          $updateJson = @"
          {
            "version": "$tag",
            "versionCode": $vc,
            "zipUrl": "https://github.com/$repo/releases/download/$tag/MicroGiskGApps-64.zip",
            "changelog": "https://raw.githubusercontent.com/$repo/main/changelog.md"
          }
          "@
          $updateJson | Set-Content "update.json"
          
          $update32Json = @"
          {
            "version": "$tag",
            "versionCode": $vc,
            "zipUrl": "https://github.com/$repo/releases/download/$tag/MicroGiskGApps-32.zip",
            "changelog": "https://raw.githubusercontent.com/$repo/main/changelog.md"
          }
          "@
          $update32Json | Set-Content "update32.json"
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add module.prop update.json update32.json changelog.md
          git commit -m "🚀 Update to $tag (VersionCode: $vc)"
          
          # Retry logic for push
          $success = $false
          for ($i = 1; $i -le 3; $i++) {
              try {
                  # Using CMD explicitly for git push to avoid powershell parsing issues with URL
                  cmd.exe /c "git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main"
                  if ($LASTEXITCODE -eq 0) {
                      $success = $true
                      break
                  }
              } catch {}
              Write-Host "⚠️ Fallo en el push de GitHub. Reintentando en 10 segundos... (Intento $i/3)"
              Start-Sleep -Seconds 10
          }
          if (-not $success) { Write-Error "Push failed after 3 attempts" }

      - name: 🚀 Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FINAL_TAG }}
          name: "${{ env.FINAL_TAG }} - ¡New Version Leaked!"
          body_path: changelog.md
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            MicroGiskGApps-32.zip
            MicroGiskGApps-64.zip

      - name: 🧹 Limpiar Releases y Tags Antiguos
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 30
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

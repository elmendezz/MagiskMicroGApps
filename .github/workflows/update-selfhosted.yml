name: Actualizar MagiskMicroGApps (Windows Host)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */3 * *'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: self-hosted # Cambiado para tu máquina Windows
    defaults:
      run:
        shell: bash # Esto usará el bash de MSYS2/Git Bash configurado

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Configurar Entorno MSYS2 (Auto-instalar dependencias)
        run: |
          echo "Verificando dependencias en el entorno Windows/MSYS2..."
          # Lista de paquetes necesarios en MSYS2
          DEPENDENCIES=(jq curl wget zip unzip rsync procps-ng)
          
          for pkg in "${DEPENDENCIES[@]}"; do
            if ! pacman -Qs $pkg > /dev/null; then
              echo "Installing $pkg..."
              pacman -S --noconfirm --needed $pkg
            fi
          done

          # Nota: 'aapt' y 'zipalign' no suelen estar en pacman. 
          # Se asume que están en el PATH (Android SDK) o debes proveer el binario .exe
          if ! command -v aapt &> /dev/null; then
            echo "❌ ERROR: 'aapt' no encontrado. Por favor instálalo o añádelo al PATH de Windows."
            exit 1
          fi

      - name: 📦 Descargar APKs y Validar
        id: download_apks
        run: |
          mkdir -p new_apks
          
          download_apk() {
            local name=$1
            local dest=$2
            local url=$3
            echo "Descargando $name..."
            
            if [ -z "$url" ] || [ "$url" == "null" ]; then
                echo "⚠️ Error: URL nula para $name"
                return 1
            fi

            wget -qO "$dest" -U "Mozilla/5.0" "$url" || true
            
            if [ ! -s "$dest" ]; then
              echo "⚠️ Advertencia: Descarga fallida o archivo de 0 bytes para $name."
              rm -f "$dest"
              return 1
            fi
            echo "✅ $name descargado correctamente ($(du -h "$dest" | cut -f1))."
            return 0
          }

          # 1. MicroG (GmsCore)
          MICROG_URL=$(curl -s "https://api.github.com/repos/microg/GmsCore/releases/latest" | jq -r '.assets[] | select(.name | startswith("com.google.android.gms") and (contains("-hw") | not) and endswith(".apk")) | .browser_download_url' | head -n 1)
          download_apk "MicroG" "new_apks/GmsCore.apk" "$MICROG_URL"

          # 2. MicroG Companion
          COMPANION_URL=$(curl -s "https://api.github.com/repos/microg/GmsCore/releases/latest" | jq -r '.assets[] | select(.name | startswith("com.android.vending") and (contains("-hw") | not) and endswith(".apk")) | .browser_download_url' | head -n 1)
          download_apk "MicroG Companion" "new_apks/Companion.apk" "$COMPANION_URL"
          
          # 3. Aurora Store (GitLab API)
          AURORA_API=$(curl -s "https://gitlab.com/api/v4/projects/6922885/releases")
          UPLOAD_PATH=$(echo "$AURORA_API" | jq -r '.[0].description' | grep -oP '/uploads/[a-zA-Z0-9]+/[^)]+\.apk' | head -n 1)
          [ -n "$UPLOAD_PATH" ] && AURORA_URL="https://gitlab.com/-/project/6922885${UPLOAD_PATH}" || AURORA_URL=$(echo "$AURORA_API" | jq -r '.[0].assets.links[]? | select(.url | test("(?i)\\.apk$")) | .url' | head -n 1)
          download_apk "Aurora Store" "new_apks/AuroraStore.apk" "$AURORA_URL"

          # 4. Aurora Services
          SVC_API=$(curl -s "https://gitlab.com/api/v4/projects/8363046/releases")
          SVC_URL=$(echo "$SVC_API" | jq -r '.[0].assets.links[]? | select(.url | test("(?i)\\.apk$")) | .url' | head -n 1)
          download_apk "Aurora Services" "new_apks/AuroraServices.apk" "$SVC_URL" || \
          download_apk "Aurora Services (Backup)" "new_apks/AuroraServices.apk" "https://gitlab.com/-/project/8363046/uploads/c22e95975571e9db143567690777a56e/AuroraServices_v1.1.1.apk"

          # 5. FakeGApps y GsfProxy (GitHub)
          download_apk "FakeGApps" "new_apks/FakeGApps.apk" "$(curl -s "https://api.github.com/repos/whew-inc/FakeGApps/releases/latest" | jq -r '.assets[0].browser_download_url')"
          download_apk "GsfProxy" "new_apks/GsfProxy.apk" "$(curl -s "https://api.github.com/repos/microg/GsfProxy/releases/latest" | jq -r '.assets[0].browser_download_url')"

          # 6. Extracción de Sync Apps desde el último Release local
          echo "🔍 Extrayendo Sync Apps del release anterior..."
          LATEST_ZIP_URL=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.assets[] | select(.name == "MicroGiskGApps-64.zip") | .browser_download_url')
          if [ -n "$LATEST_ZIP_URL" ] && [ "$LATEST_ZIP_URL" != "null" ]; then
            wget -qO "base.zip" "$LATEST_ZIP_URL"
            unzip -j "base.zip" "*GoogleContactsSync.apk" -d new_apks/ || true
            unzip -j "base.zip" "*GoogleCalendarSync.apk" -d new_apks/ || true
            rm -f "base.zip"
          fi

      - name: 🚀 Optimizar APKs (Zipalign)
        run: |
          for apk in new_apks/*.apk; do
            if [ -f "$apk" ]; then
              zipalign -p -f -v 4 "$apk" "${apk%.apk}-aligned.apk" && mv "${apk%.apk}-aligned.apk" "$apk"
            fi
          done

      - name: 🔍 Versiones y module.prop
        run: |
          # Función para obtener versión en Windows usando aapt
          get_ver() { aapt dump badging "$1" 2>/dev/null | grep "package:" | sed -n "s/.*versionName='\([^']*\)'.*/\1/p"; }
          
          NEW_VC=$(($(grep '^versionCode=' module.prop | cut -d= -f2 | tr -d '\r' || echo 0) + 1))
          FINAL_TAG="A$(date +'%y.%m')-MicroG"
          
          echo "NEW_VC=$NEW_VC" >> $GITHUB_ENV
          echo "FINAL_TAG=$FINAL_TAG" >> $GITHUB_ENV

          # Actualizar archivo module.prop (asegurando formato Unix)
          sed -i "s/^versionCode=.*/versionCode=$NEW_VC/" module.prop
          sed -i "s/^version=.*/version=$FINAL_TAG/" module.prop

      - name: 🛠️ Construir Estructura de MMT-Extended
        run: |
          [ -d mmt_template ] && rm -rf mmt_template
          git clone --depth 1 https://github.com/Zackptg5/MMT-Extended.git mmt_template
          
          build_zip() {
            local arch=$1
            local folder="build-$arch"
            mkdir -p "$folder"
            rsync -a mmt_template/ "$folder/"
            # Limpieza y creación de carpetas
            mkdir -p "$folder/system/priv-app/GmsCore" "$folder/system/priv-app/AuroraStore" "$folder/system/etc/permissions"
            
            cp new_apks/GmsCore.apk "$folder/system/priv-app/GmsCore/"
            cp new_apks/AuroraStore.apk "$folder/system/priv-app/AuroraStore/"
            cp module.prop "$folder/"
            
            # Inyectar permisos XML generados previamente (puedes añadir el paso cat <<EOF del original aquí)
            
            cd "$folder" && zip -r9 "../MicroGiskGApps-$arch.zip" . && cd ..
          }

          build_zip "64"
          build_zip "32"

      - name: 📝 Commitear y Publicar
        run: |
          git config --global user.name "Actions Bot"
          git config --global user.email "bot@github.com"
          git add module.prop
          git commit -m "Update $FINAL_TAG" || echo "No changes"
          git push origin main
          
      - name: 🚀 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FINAL_TAG }}
          files: |
            MicroGiskGApps-32.zip
            MicroGiskGApps-64.zip
          token: ${{ secrets.GITHUB_TOKEN }}

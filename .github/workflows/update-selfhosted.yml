name: Actualizar MagiskMicroGApps (Windows CMD)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */3 * *'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: self-hosted
    # Forzamos el uso de CMD para todo el job
    defaults:
      run:
        shell: cmd

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Descargar y Verificar APKs (Sin Bash)
        run: |
          if not exist new_apks mkdir new_apks
          
          :: --- 1. Descargar MicroG GmsCore ---
          :: Usamos PowerShell internamente desde CMD para obtener la URL y descargar
          powershell -Command "$url = (Invoke-RestMethod 'https://api.github.com/repos/microg/GmsCore/releases/latest').assets | Where-Object { $_.name -like 'com.google.android.gms*' -and $_.name -notlike '*-hw*' } | Select-Object -ExpandProperty browser_download_url -First 1; Invoke-WebRequest -Uri $url -OutFile 'new_apks\GmsCore.apk' -UserAgent 'Mozilla/5.0'"
          
                    :: --- 2. Descargar Aurora Store ---
          powershell -Command "$api = Invoke-RestMethod 'https://gitlab.com/api/v4/projects/6922885/releases'; $latest = $api[0]; $url = $null; if ($latest.description -match '(/uploads/[a-zA-Z0-9]+/[^\s)]+\.apk)') { $url = 'https://gitlab.com/-/project/6922885' + $matches[1] } elseif ($latest.assets.links) { $url = $latest.assets.links | Where-Object { $_.url -match '\.apk$' } | Select-Object -ExpandProperty url -First 1 }; if ($url) { Write-Host 'Descargando Aurora de:' $url; Invoke-WebRequest -Uri $url -OutFile 'new_apks\AuroraStore.apk' -UserAgent 'Mozilla/5.0' } else { Write-Error '❌ No se encontro la URL de Aurora Store'; exit 1 }"

          :: --- VERIFICACIÓN DE SEGURIDAD ---
          :: Comprobar si los archivos existen y no son de 0 bytes
          for %%i in (new_apks\GmsCore.apk new_apks\AuroraStore.apk) do (
              if not exist "%%i" (
                  echo ❌ ERROR: %%i no se descargo.
                  exit /b 1
              )
              if %%~zi LSS 1024 (
                  echo ❌ ERROR: %%i esta corrupto o pesa 0 bytes.
                  del "%%i"
                  exit /b 1
              )
          )
          echo ✅ APKs verificadas correctamente.

      - name: 🏷️ Calcular Version y Tag
        id: vars
        run: |
          :: Leer versionCode actual de module.prop
          set "VC="
          for /f "tokens=2 delims==" %%a in ('findstr "versionCode=" module.prop') do set VC=%%a
          set /a NEW_VC=%VC% + 1
          
          :: Generar Tag basado en fecha y VC para evitar repetidos
          for /f "tokens=2 delims==" %%a in ('wmic os get localdatetime /value') do set dt=%%a
          set "YEAR=%dt:~2,2%"
          set "MONTH=%dt:~4,2%"
          set "FINAL_TAG=A%YEAR%.%MONTH%.%NEW_VC%-MicroG"
          
          :: Guardar para pasos siguientes
          echo NEW_VC=%NEW_VC%>> %GITHUB_ENV%
          echo FINAL_TAG=%FINAL_TAG%>> %GITHUB_ENV%
          
          :: Actualizar module.prop directamente en CMD
          powershell -Command "(Get-Content module.prop) -replace 'versionCode=.*', 'versionCode=%NEW_VC%' -replace 'version=.*', 'version=%FINAL_TAG%' | Set-Content module.prop"
          
          echo ✅ Nueva Version: %FINAL_TAG% (VC: %NEW_VC%)

      - name: 🚀 Optimizar (Zipalign)
        run: |
          :: Usando la ruta absoluta de zipalign para evitar errores de PATH
          for %%f in (new_apks\*.apk) do (
              "C:\AndroidSDK\build-tools\34.0.0\zipalign.exe" -p -f -v 4 "%%f" "%%~dpnf-aligned.apk"
              move /y "%%~dpnf-aligned.apk" "%%f"
          )


      - name: 🛠️ Construir Zips (Zip Nativo)
        run: |
          if exist mmt_template rmdir /s /q mmt_template
          git clone --depth 1 https://github.com/Zackptg5/MMT-Extended.git mmt_template
          
          :: --- Build 64-bit ---
          mkdir build64\system\priv-app\GmsCore
          mkdir build64\system\priv-app\AuroraStore
          xcopy /s /e /y mmt_template\* build64\
          copy /y module.prop build64\
          copy /y new_apks\GmsCore.apk build64\system\priv-app\GmsCore\
          copy /y new_apks\AuroraStore.apk build64\system\priv-app\AuroraStore\
          
          :: Crear el ZIP usando PowerShell (nativo en Windows)
          powershell -Command "Compress-Archive -Path 'build64\*' -DestinationPath 'MicroGiskGApps-64.zip' -Force"

          :: --- Build 32-bit ---
          mkdir build32\system\priv-app\GmsCore
          xcopy /s /e /y mmt_template\* build32\
          copy /y module.prop build32\
          copy /y new_apks\GmsCore.apk build32\system\priv-app\GmsCore\
          powershell -Command "Compress-Archive -Path 'build32\*' -DestinationPath 'MicroGiskGApps-32.zip' -Force"

      - name: 📝 Git Commit
        run: |
          git config user.name "Actions Bot"
          git config user.email "bot@github.com"
          git add module.prop
          git commit -m "🚀 Update to %FINAL_TAG%"
          git push origin main

      - name: 🚀 Publicar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FINAL_TAG }}
          name: "¡New Version! - ${{ env.FINAL_TAG }}"
          files: |
            MicroGiskGApps-32.zip
            MicroGiskGApps-64.zip
          token: ${{ secrets.GITHUB_TOKEN }}

name: Actualizar MagiskMicroGApps

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y aapt jq curl wget zip unzip dos2unix

      - name: 📦 Descargar APKs (SIN HW)
        run: |
          mkdir -p new_apks

          echo "Descargando MicroG normal..."
          MICROG_URL=$(curl -s https://api.github.com/repos/microg/GmsCore/releases/latest | jq -r '
            .assets[] |
            select(
              .name |
              startswith("com.google.android.gms") and
              endswith(".apk") and
              (test("-hw") | not)
            ) |
            .browser_download_url
          ' | head -n 1)

          wget -qO new_apks/GmsCore.apk "$MICROG_URL"

          echo "Descargando Aurora Store..."
          AURORA_URL=$(curl -s https://gitlab.com/api/v4/projects/6922885/releases \
            | jq -r '.[0].assets.links[]? | select(.url | test("(?i)\\.apk$")) | .url' \
            | head -n 1)

          wget -qO new_apks/AuroraStore.apk "$AURORA_URL"

          echo "Descargando FakeGApps..."
          FAKEGAPPS_URL=$(curl -s https://api.github.com/repos/whew-inc/FakeGApps/releases/latest \
            | jq -r '.assets[] | select(.name|test(".*\\.apk$")) | .browser_download_url' \
            | head -n 1)

          curl -f -L -o new_apks/FakeGApps.apk "$FAKEGAPPS_URL"

      - name: 🔢 Actualizar versionado
        run: |
          sed -i 's/\r$//' module.prop
          dos2unix module.prop

          OLD_VC=$(grep '^versionCode=' module.prop | cut -d= -f2 | tr -d ' ')
          NEW_VC=$((OLD_VC + 1))

          OLD_VER=$(grep '^version=' module.prop | cut -d= -f2 | tr -d ' ')
          NEW_VER="${OLD_VER}.${NEW_VC}"
          FINAL_TAG="A${NEW_VER}-MicroG"

          echo "NEW_VC=$NEW_VC" >> $GITHUB_ENV
          echo "FINAL_TAG=$FINAL_TAG" >> $GITHUB_ENV

          sed -i "s/^versionCode=.*/versionCode=$NEW_VC/" module.prop
          sed -i "s/^version=.*/version=$FINAL_TAG/" module.prop

      - name: 🛠️ Construir ZIPs limpios
        run: |
          for ARCH in 32 64; do
            rm -rf build-${ARCH}
            mkdir -p build-${ARCH}/system/priv-app/GmsCore
            mkdir -p build-${ARCH}/system/priv-app/FakeGApps
            mkdir -p build-${ARCH}/system/app/AuroraStore

            cp -r META-INF build-${ARCH}/
            cp module.prop customize.sh uninstall.sh build-${ARCH}/
            [ -d common ] && cp -r common build-${ARCH}/

            cp new_apks/GmsCore.apk build-${ARCH}/system/priv-app/GmsCore/
            cp new_apks/FakeGApps.apk build-${ARCH}/system/priv-app/FakeGApps/
            cp new_apks/AuroraStore.apk build-${ARCH}/system/app/AuroraStore/

            # FIX newline
            sed -i -e '$a\' build-${ARCH}/module.prop

            if [ "$ARCH" == "32" ]; then
              JSON_FILE="update32.json"
            else
              JSON_FILE="update.json"
            fi

            echo "updateJson=https://raw.githubusercontent.com/${{ github.repository }}/main/${JSON_FILE}" >> build-${ARCH}/module.prop

            # Permisos correctos
            chmod -R 755 build-${ARCH}/META-INF
            chmod 644 build-${ARCH}/module.prop
            chmod 755 build-${ARCH}/customize.sh || true
            chmod 755 build-${ARCH}/uninstall.sh || true
            [ -d build-${ARCH}/common ] && chmod -R 755 build-${ARCH}/common

            # Extraer libs correctas
            if [ "$ARCH" == "32" ]; then
              unzip -j new_apks/GmsCore.apk "lib/armeabi-v7a/*.so" -d build-${ARCH}/system/priv-app/GmsCore/ || true
            else
              unzip -j new_apks/GmsCore.apk "lib/arm64-v8a/*.so" -d build-${ARCH}/system/priv-app/GmsCore/ || true
            fi

            cd build-${ARCH}
            zip -r9 ../MicroGiskGApps-${ARCH}.zip .
            cd ..
          done

      - name: 📝 Generar update.json
        run: |
          cat <<EOF > update.json
          {
            "version": "${{ env.FINAL_TAG }}",
            "versionCode": ${{ env.NEW_VC }},
            "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${{ env.FINAL_TAG }}/MicroGiskGApps-64.zip",
            "changelog": "https://github.com/${{ github.repository }}/releases/tag/${{ env.FINAL_TAG }}"
          }
          EOF

          cat <<EOF > update32.json
          {
            "version": "${{ env.FINAL_TAG }}",
            "versionCode": ${{ env.NEW_VC }},
            "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${{ env.FINAL_TAG }}/MicroGiskGApps-32.zip",
            "changelog": "https://github.com/${{ github.repository }}/releases/tag/${{ env.FINAL_TAG }}"
          }
          EOF

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add module.prop update.json update32.json
          git commit -m "🚀 ${{ env.FINAL_TAG }}" || echo "Nothing to commit"
          git push

      - name: 🚀 Publicar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FINAL_TAG }}
          name: "${{ env.FINAL_TAG }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            MicroGiskGApps-32.zip
            MicroGiskGApps-64.zip
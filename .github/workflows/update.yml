name: Actualizar MagiskMicroGApps

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Configurar Entorno (aapt, jq, curl, dos2unix)
        run: |
          sudo apt-get update
          sudo apt-get install -y aapt jq curl wget zip unzip dos2unix rsync

      - name: 📦 Descargar APKs más recientes
        id: download_apks
        run: |
          mkdir -p new_apks
          
          # 1. MicroG (GmsCore) NORMAL (Excluyendo versiones -hw de Huawei)
          echo "Descargando MicroG..."
          MICROG_URL=$(curl -s "https://api.github.com/repos/microg/GmsCore/releases/latest" | jq -r '.assets[] | select(.name | startswith("com.google.android.gms") and (contains("-hw") | not) and endswith(".apk")) | .browser_download_url' | head -n 1)
          wget -qO new_apks/GmsCore.apk -U "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" "$MICROG_URL"

          # 2. MicroG Companion (Vending / FakeStore)
          echo "Descargando MicroG Companion..."
          COMPANION_URL=$(curl -s "https://api.github.com/repos/microg/GmsCore/releases/latest" | jq -r '.assets[] | select(.name | startswith("com.android.vending") and endswith(".apk")) | .browser_download_url' | head -n 1)
          if [ -n "$COMPANION_URL" ]; then
            wget -qO new_apks/Companion.apk -U "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" "$COMPANION_URL"
          fi
          
          # 3. Aurora Store
          echo "Descargando Aurora Store..."
          AURORA_API=$(curl -s "https://gitlab.com/api/v4/projects/6922885/releases")
          UPLOAD_PATH=$(echo "$AURORA_API" | jq -r '.[0].description' | grep -oP '/uploads/[a-zA-Z0-9]+/[^)]+\.apk' | head -n 1)
          
          if [ -n "$UPLOAD_PATH" ]; then
            AURORA_URL="https://gitlab.com/-/project/6922885${UPLOAD_PATH}"
          else
            AURORA_URL=$(echo "$AURORA_API" | jq -r '.[0].assets.links[]? | select(.url | test("(?i)\\.apk$")) | .url' | head -n 1)
          fi
          wget -qO new_apks/AuroraStore.apk -U "Mozilla/5.0" "$AURORA_URL"

          # 4. Obtener FakeGApps
          echo "Descargando FakeGApps..."
          FAKEGAPPS_JSON=$(curl -sL "https://api.github.com/repos/whew-inc/FakeGApps/releases/latest")
          FAKEGAPPS_VER=$(echo "$FAKEGAPPS_JSON" | jq -r .tag_name)
          FAKEGAPPS_URL=$(echo "$FAKEGAPPS_JSON" | jq -r '.assets[] | select(.name|test(".*\\.apk$")) | .browser_download_url' | head -n 1)

          if [ -z "$FAKEGAPPS_URL" ] || [ "$FAKEGAPPS_URL" == "null" ]; then
            FAKEGAPPS_VER="6.6"
            FAKEGAPPS_URL="https://github.com/whew-inc/FakeGApps/releases/download/6.6/app-release.apk"
          fi
          curl -f -sL -o new_apks/FakeGApps.apk "$FAKEGAPPS_URL"

      - name: 🔍 Obtener versiones y generar Changelog
        id: versions
        run: |
          get_version() {
            if [ -f "$1" ]; then
              aapt dump badging "$1" | grep versionName | awk -F"'" '{print $4}'
            else
              echo "0.0.0"
            fi
          }

          NEW_MICROG=$(get_version "new_apks/GmsCore.apk")
          NEW_COMPANION=$(get_version "new_apks/Companion.apk")
          NEW_AURORA=$(get_version "new_apks/AuroraStore.apk")
          NEW_FAKEGAPPS=$(get_version "new_apks/FakeGApps.apk")

          # Limpiar retornos de carro antes de leer
          [ -f module.prop ] && dos2unix module.prop || touch module.prop

          OLD_VC=$(grep '^versionCode=' module.prop | cut -d= -f2 | tr -d ' ' || echo "1")
          NEW_VC=$((OLD_VC + 1))
          OLD_VER=$(grep '^version=' module.prop | grep -oE '[0-9]+(\.[0-9]+)?' | head -n 1 || echo "13.0")
          NEW_VER=$(echo $OLD_VER | awk -F. '{if(NF==1){print $1".1"}else{$NF = $NF + 1; print $0}}' | sed 's/ /./g')
          FINAL_TAG="A${NEW_VER}-MicroG"

          echo "NEW_VC=$NEW_VC" >> $GITHUB_ENV
          echo "FINAL_TAG=$FINAL_TAG" >> $GITHUB_ENV

          # Actualizar versiones en module.prop localmente para el commit
          sed -i "s/^versionCode=.*/versionCode=$NEW_VC/" module.prop || echo "versionCode=$NEW_VC" >> module.prop
          sed -i "s/^version=.*/version=$FINAL_TAG/" module.prop || echo "version=$FINAL_TAG" >> module.prop
          
          # Renombrar Módulo
          sed -i 's/^id=.*/id=MicroGiskGApps/' module.prop || echo "id=MicroGiskGApps" >> module.prop
          sed -i 's/^name=.*/name=MicroGiskGApps/' module.prop || echo "name=MicroGiskGApps" >> module.prop

          # --- GENERACIÓN DE CHANGELOG BILINGÜE ---
          echo "### Changelog / Registro de cambios" > changelog.md
          
          echo "- **MicroG (GmsCore)**: v$NEW_MICROG" >> changelog.md
          echo "- **MicroG Companion**: v$NEW_COMPANION" >> changelog.md
          echo "- **Aurora Store**: v$NEW_AURORA" >> changelog.md
          echo "- **FakeGApps**: v$NEW_FAKEGAPPS" >> changelog.md
          echo "" >> changelog.md
          echo "- **PlayStore / Others**: Up to date (No changes) / Inactualizable (Se mantienen sin cambios)" >> changelog.md

      - name: 🛠️ Construir Zips (32-bit y 64-bit) e Inyectar Template MMT-Extended
        run: |
          # 1. Clonar el Template MMT-Extended
          git clone --depth 1 https://github.com/Zackptg5/MMT-Extended.git mmt_template
          
          for ARCH in 32 64; do
            # 2. Copiar todo el template a nuestra carpeta de construcción
            rsync -a mmt_template/ build-${ARCH}/
            
            # 3. Limpiar basura del template
            rm -rf build-${ARCH}/.git build-${ARCH}/README.md build-${ARCH}/.gitignore
            
            # 4. Crear estructura de carpetas de sistema
            mkdir -p build-${ARCH}/system/priv-app/GmsCore/lib
            mkdir -p build-${ARCH}/system/priv-app/Companion
            mkdir -p build-${ARCH}/system/priv-app/FakeGApps
            mkdir -p build-${ARCH}/system/app/AuroraStore
            
            # 5. Sobrescribir con nuestros archivos locales (module.prop, uninstall.sh)
            cp module.prop build-${ARCH}/
            [ -f uninstall.sh ] && cp uninstall.sh build-${ARCH}/
            [ -d common ] && cp -r common build-${ARCH}/
            [ -d system ] && cp -r system/* build-${ARCH}/system/ || true
            
            # 6. Copiar APKs
            cp new_apks/GmsCore.apk build-${ARCH}/system/priv-app/GmsCore/
            [ -f new_apks/Companion.apk ] && cp new_apks/Companion.apk build-${ARCH}/system/priv-app/Companion/
            cp new_apks/FakeGApps.apk build-${ARCH}/system/priv-app/FakeGApps/
            cp new_apks/AuroraStore.apk build-${ARCH}/system/app/AuroraStore/

            if [ "$ARCH" == "32" ]; then
              JSON_FILE="update32.json"
            else
              JSON_FILE="update.json"
            fi
            
            # Asegurar salto de línea antes de inyectar updateJson
            sed -i -e '$a\' build-${ARCH}/module.prop
            
            # Inyectar updateJson según la arquitectura
            if grep -q "^updateJson=" build-${ARCH}/module.prop; then
              sed -i "s|^updateJson=.*|updateJson=https://raw.githubusercontent.com/${{ github.repository }}/main/${JSON_FILE}|" build-${ARCH}/module.prop
            else
              echo "updateJson=https://raw.githubusercontent.com/${{ github.repository }}/main/${JSON_FILE}" >> build-${ARCH}/module.prop
            fi

            # --- CORRECCIÓN FINAL CRLF ---
            # Convertimos scripts a formato UNIX para evitar Exit Code 2
            find build-${ARCH} -type f \( -name "*.sh" -o -name "*.prop" \) -exec dos2unix {} +
          done

          # Extraer librerías .so (GmsCore)
          unzip -j new_apks/GmsCore.apk "lib/armeabi-v7a/*.so" -d build-32/system/priv-app/GmsCore/lib/arm || true
          unzip -j new_apks/GmsCore.apk "lib/arm64-v8a/*.so" -d build-64/system/priv-app/GmsCore/lib/arm64 || true

          cd build-32 && zip -r9 ../MicroGiskGApps-32.zip . && cd ..
          cd build-64 && zip -r9 ../MicroGiskGApps-64.zip . && cd ..

      - name: 📝 Generar update.jsons y Commitear cambios al Repo
        run: |
          cat <<EOF > update.json
          {
            "version": "${{ env.FINAL_TAG }}",
            "versionCode": ${{ env.NEW_VC }},
            "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${{ env.FINAL_TAG }}/MicroGiskGApps-64.zip",
            "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/main/changelog.md"
          }
          EOF

          cat <<EOF > update32.json
          {
            "version": "${{ env.FINAL_TAG }}",
            "versionCode": ${{ env.NEW_VC }},
            "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${{ env.FINAL_TAG }}/MicroGiskGApps-32.zip",
            "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/main/changelog.md"
          }
          EOF

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add module.prop update.json update32.json changelog.md
          git commit -m "🚀 Update to ${{ env.FINAL_TAG }} (VersionCode: ${{ env.NEW_VC }})" || echo "Nothing to commit"
          git push

      - name: 🚀 Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FINAL_TAG }}
          name: "${{ env.FINAL_TAG }} - ¡New Version Leaked!"
          body_path: changelog.md
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            MicroGiskGApps-32.zip
            MicroGiskGApps-64.zip

name: Actualizar MagiskMicroGApps

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */3 * *'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Configurar Entorno
        run: |
          sudo apt-get update
          sudo apt-get install -y aapt jq curl wget zip unzip dos2unix rsync zipalign

      - name: 📦 Descargar APKs y Validar (Prevención de 0 bytes)
        id: download_apks
        run: |
          mkdir -p new_apks
          
          download_apk() {
            local name=$1
            local dest=$2
            local url=$3
            echo "Descargando $name..."
            wget -qO "$dest" -U "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" "$url" || true
            if [ ! -s "$dest" ]; then
              echo "⚠️ Advertencia: Descarga fallida para $name. Se omitirá."
              rm -f "$dest"
              return 0
            fi
            echo "✅ $name descargado."
            return 0
          }

          # 1. MicroG (GmsCore)
          MICROG_URL=$(curl -s "https://api.github.com/repos/microg/GmsCore/releases/latest" | jq -r '.assets[] | select(.name | startswith("com.google.android.gms") and (contains("-hw") | not) and endswith(".apk")) | .browser_download_url' | head -n 1)
          download_apk "MicroG" "new_apks/GmsCore.apk" "$MICROG_URL"

          # 2. MicroG Companion
          COMPANION_URL=$(curl -s "https://api.github.com/repos/microg/GmsCore/releases/latest" | jq -r '.assets[] | select(.name | startswith("com.android.vending") and (contains("-hw") | not) and endswith(".apk")) | .browser_download_url' | head -n 1)
          [ -n "$COMPANION_URL" ] && download_apk "MicroG Companion" "new_apks/Companion.apk" "$COMPANION_URL"
          
          # 3. Aurora Store
          AURORA_API=$(curl -s "https://gitlab.com/api/v4/projects/6922885/releases")
          UPLOAD_PATH=$(echo "$AURORA_API" | jq -r '.[0].description' | grep -oP '/uploads/[a-zA-Z0-9]+/[^)]+\.apk' | head -n 1)
          if [ -n "$UPLOAD_PATH" ]; then
            AURORA_URL="https://gitlab.com/-/project/6922885${UPLOAD_PATH}"
          else
            AURORA_URL=$(echo "$AURORA_API" | jq -r '.[0].assets.links[]? | select(.url | test("(?i)\\.apk$")) | .url' | head -n 1)
          fi
          download_apk "Aurora Store" "new_apks/AuroraStore.apk" "$AURORA_URL"

          # 4. Aurora Services
          CURRENT_SVC_VER="1.1.1"
          SVC_API=$(curl -s "https://gitlab.com/api/v4/projects/8363046/releases")
          LATEST_SVC_VER=$(echo "$SVC_API" | jq -r '.[0].tag_name' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "$CURRENT_SVC_VER")
          
          if [ "$(printf '%s\n' "$CURRENT_SVC_VER" "$LATEST_SVC_VER" | sort -V | tail -n1)" != "$CURRENT_SVC_VER" ]; then
            SVC_URL=$(echo "$SVC_API" | jq -r '.[0].assets.links[]? | select(.url | test("(?i)\\.apk$")) | .url' | head -n 1)
            [ -z "$SVC_URL" ] && SVC_URL="https://gitlab.com/-/project/8363046"$(echo "$SVC_API" | jq -r '.[0].description' | grep -oP '/uploads/[a-zA-Z0-9]+/[^)]+\.apk' | head -n 1)
            download_apk "Aurora Services" "new_apks/AuroraServices.apk" "$SVC_URL"
          else
            download_apk "Aurora Services (Estático)" "new_apks/AuroraServices.apk" "https://gitlab.com/-/project/8363046/uploads/c22e95975571e9db143567690777a56e/AuroraServices_v1.1.1.apk"
          fi

          # 5. FakeGApps
          FAKEGAPPS_JSON=$(curl -sL "https://api.github.com/repos/whew-inc/FakeGApps/releases/latest")
          FAKEGAPPS_URL=$(echo "$FAKEGAPPS_JSON" | jq -r '.assets[] | select(.name|test(".*\\.apk$")) | .browser_download_url' | head -n 1)
          [ -z "$FAKEGAPPS_URL" ] || [ "$FAKEGAPPS_URL" == "null" ] && FAKEGAPPS_URL="https://github.com/whew-inc/FakeGApps/releases/download/6.6/app-release.apk"
          download_apk "FakeGApps" "new_apks/FakeGApps.apk" "$FAKEGAPPS_URL"

          # 6. GsfProxy
          GSFPROXY_URL=$(curl -s "https://api.github.com/repos/microg/GsfProxy/releases/latest" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          [ -z "$GSFPROXY_URL" ] || [ "$GSFPROXY_URL" == "null" ] && GSFPROXY_URL="https://github.com/microg/GsfProxy/releases/download/v0.1.0/GsfProxy.apk"
          download_apk "GsfProxy" "new_apks/GsfProxy.apk" "$GSFPROXY_URL"

          # 7. Google Sync Adapters (Múltiples fuentes por seguridad antibots)
          SYNC_BASE="https://github.com/WeAreOpenGApps/x86_64-10.0-api/raw/master/app"
          download_apk "Google Contacts Sync" "new_apks/GoogleContactsSync.apk" "$SYNC_BASE/GoogleContactsSyncAdapter/GoogleContactsSyncAdapter.apk"
          download_apk "Google Calendar Sync" "new_apks/GoogleCalendarSync.apk" "$SYNC_BASE/GoogleCalendarSyncAdapter/GoogleCalendarSyncAdapter.apk"

      - name: 🚀 Optimizar APKs (Zipalign)
        run: |
          for apk in new_apks/*.apk; do
            if [ -f "$apk" ]; then
              zipalign -p -v 4 "$apk" "${apk%.apk}-aligned.apk" || true
              mv "${apk%.apk}-aligned.apk" "$apk" || true
            fi
          done

      - name: 🔍 Obtener versiones y generar Changelog Base
        id: versions
        run: |
          get_version_info() {
            if [ -f "$1" ]; then
              echo "$(aapt dump badging "$1" | grep "package:" | sed -n "s/.*versionName='\([^']*\)'.*/\1/p")"
            else
              echo "No incluido"
            fi
          }

          [ -f module.prop ] && dos2unix module.prop || touch module.prop

          OLD_VC=$(grep '^versionCode=' module.prop | cut -d= -f2 | tr -d ' ' || echo "1")
          NEW_VC=$((OLD_VC + 1))
          OLD_VER=$(grep '^version=' module.prop | grep -oE '[0-9]+(\.[0-9]+)?' | head -n 1 || echo "13.0")
          NEW_VER=$(echo "$OLD_VER" | awk -F. '{ major=$1; minor=$2; if(minor=="") minor=0; minor++; if(minor>=10) { major++; minor=0; } print major"."minor }')
          FINAL_TAG="A${NEW_VER}-MicroG"

          echo "NEW_VC=$NEW_VC" >> $GITHUB_ENV
          echo "FINAL_TAG=$FINAL_TAG" >> $GITHUB_ENV

          sed -i "s/^versionCode=.*/versionCode=$NEW_VC/" module.prop || echo "versionCode=$NEW_VC" >> module.prop
          sed -i "s/^version=.*/version=$FINAL_TAG/" module.prop || echo "version=$FINAL_TAG" >> module.prop

          echo "### Changelog / Registro de cambios" > changelog.md
          echo "- **MicroG**: v$(get_version_info new_apks/GmsCore.apk)" >> changelog.md
          echo "- **Contacts Sync**: v$(get_version_info new_apks/GoogleContactsSync.apk)" >> changelog.md
          echo "- **Calendar Sync**: v$(get_version_info new_apks/GoogleCalendarSync.apk)" >> changelog.md

      - name: 🛠️ Construir Zips y Crear Archivos de Permisos
        run: |
          git clone --depth 1 https://github.com/Zackptg5/MMT-Extended.git mmt_template
          
          for ARCH in 32 64; do
            rsync -a mmt_template/ build-${ARCH}/
            rm -rf build-${ARCH}/.git build-${ARCH}/.github build-${ARCH}/README.md build-${ARCH}/zygisk
            find build-${ARCH} -type f -iname "*placeholder*" -delete
            
            # Crear directorios de apps
            mkdir -p build-${ARCH}/system/priv-app/GmsCore/lib build-${ARCH}/system/priv-app/Companion build-${ARCH}/system/priv-app/FakeGApps build-${ARCH}/system/priv-app/AuroraServices build-${ARCH}/system/app/AuroraStore build-${ARCH}/system/app/GsfProxy build-${ARCH}/system/app/GoogleContactsSync build-${ARCH}/system/app/GoogleCalendarSync
            
            # Crear directorio de permisos
            mkdir -p build-${ARCH}/system/etc/default-permissions
            
            # --- INYECCIÓN DE PERMISOS PARA MICROG ---
            cat <<EOF > build-${ARCH}/system/etc/default-permissions/microg-permissions.xml
            <?xml version="1.0" encoding="utf-8"?>
            <exceptions>
                <exception package="com.google.android.gms">
                    <permission name="android.permission.ACCESS_FINE_LOCATION" fixed="false"/>
                    <permission name="android.permission.ACCESS_COARSE_LOCATION" fixed="false"/>
                    <permission name="android.permission.ACCESS_BACKGROUND_LOCATION" fixed="false"/>
                    <permission name="android.permission.READ_CONTACTS" fixed="false"/>
                    <permission name="android.permission.WRITE_CONTACTS" fixed="false"/>
                    <permission name="android.permission.READ_PHONE_STATE" fixed="false"/>
                    <permission name="android.permission.CAMERA" fixed="false"/>
                    <permission name="android.permission.GET_ACCOUNTS" fixed="false"/>
                </exception>
            </exceptions>
          EOF

            # --- INYECCIÓN DE PERMISOS PARA SYNC ADAPTERS ---
            cat <<EOF > build-${ARCH}/system/etc/default-permissions/sync-permissions.xml
            <?xml version="1.0" encoding="utf-8"?>
            <exceptions>
                <exception package="com.google.android.syncadapters.contacts">
                    <permission name="android.permission.READ_CONTACTS" fixed="false"/>
                    <permission name="android.permission.WRITE_CONTACTS" fixed="false"/>
                    <permission name="android.permission.GET_ACCOUNTS" fixed="false"/>
                </exception>
                <exception package="com.google.android.syncadapters.calendar">
                    <permission name="android.permission.READ_CALENDAR" fixed="false"/>
                    <permission name="android.permission.WRITE_CALENDAR" fixed="false"/>
                    <permission name="android.permission.GET_ACCOUNTS" fixed="false"/>
                    <permission name="android.permission.READ_CONTACTS" fixed="false"/>
                </exception>
            </exceptions>
          EOF
            
            cp module.prop build-${ARCH}/
            [ -d common ] && cp -r common build-${ARCH}/
            
            # Copiar APKs
            [ -f new_apks/GmsCore.apk ] && cp -f new_apks/GmsCore.apk build-${ARCH}/system/priv-app/GmsCore/GmsCore.apk
            [ -f new_apks/GoogleContactsSync.apk ] && cp -f new_apks/GoogleContactsSync.apk build-${ARCH}/system/app/GoogleContactsSync/GoogleContactsSync.apk
            [ -f new_apks/GoogleCalendarSync.apk ] && cp -f new_apks/GoogleCalendarSync.apk build-${ARCH}/system/app/GoogleCalendarSync/GoogleCalendarSync.apk
            [ -f new_apks/FakeGApps.apk ] && cp -f new_apks/FakeGApps.apk build-${ARCH}/system/priv-app/FakeGApps/FakeGApps.apk
            [ -f new_apks/Companion.apk ] && cp -f new_apks/Companion.apk build-${ARCH}/system/priv-app/Companion/Companion.apk
            [ -f new_apks/AuroraStore.apk ] && cp -f new_apks/AuroraStore.apk build-${ARCH}/system/app/AuroraStore/AuroraStore.apk

            JSON_FILE=$([ "$ARCH" == "32" ] && echo "update32.json" || echo "update.json")
            sed -i -e '$a\' build-${ARCH}/module.prop
            echo "updateJson=https://raw.githubusercontent.com/${{ github.repository }}/main/${JSON_FILE}" >> build-${ARCH}/module.prop

            find build-${ARCH} -type f \( -name "*.sh" -o -name "*.prop" \) -exec dos2unix {} +
          done

          cd build-32 && zip -r9 ../MicroGiskGApps-32.zip . && cd ..
          cd build-64 && zip -r9 ../MicroGiskGApps-64.zip . && cd ..

      - name: 📝 Generar update.jsons y Commitear cambios
        run: |
          cat <<EOF > update.json
          { "version": "${{ env.FINAL_TAG }}", "versionCode": ${{ env.NEW_VC }}, "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${{ env.FINAL_TAG }}/MicroGiskGApps-64.zip", "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/main/changelog.md" }
          EOF
          
          cat <<EOF > update32.json
          { "version": "${{ env.FINAL_TAG }}", "versionCode": ${{ env.NEW_VC }}, "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${{ env.FINAL_TAG }}/MicroGiskGApps-32.zip", "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/main/changelog.md" }
          EOF

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add module.prop update.json update32.json changelog.md
          git commit -m "🚀 Update to ${{ env.FINAL_TAG }}" || true
          git push origin HEAD:main || true

      - name: 🚀 Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FINAL_TAG }}
          name: "${{ env.FINAL_TAG }} - ¡New Version!"
          body_path: changelog.md
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            MicroGiskGApps-32.zip
            MicroGiskGApps-64.zip

      - name: 🧹 Limpiar Releases (Mantener últimas 30)
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 30
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
